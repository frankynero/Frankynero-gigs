<!DOCTYPE html>
<html>
<head>
  <title>Frankynero Gigs</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      padding: 80px 20px 60px;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                  url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid #222;
    }

    header h1 {
      margin: 0;
      font-size: 44px;
      font-weight: 800;
      color: #00ffcc;
    }

    header p {
      margin-top: 10px;
      color: #ccc;
      font-size: 14px;
    }

    .socials {
      margin-top: 20px;
    }

    .socials a {
      margin: 0 10px;
      text-decoration: none;
      color: #00ffcc;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 20px;
      border-radius: 25px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ddb3;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 30px 20px;
    }

    .gig {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 15px;
      transition: 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .gig:hover {
      transform: translateY(-3px);
      border-color: #00ffcc;
      box-shadow: 0 10px 25px rgba(0,255,204,0.1);
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .date {
      font-weight: 700;
      color: #00ffcc;
    }

    .venue {
      color: #fff;
    }

    .location {
      font-size: 13px;
      color: #888;
    }

    .tag {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 20px;
      background: rgba(0,255,204,0.1);
      color: #00ffcc;
      border: 1px solid rgba(0,255,204,0.3);
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #555;
      font-size: 12px;
      border-top: 1px solid #222;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .gig {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Frankynero</h1>
  <p>Live Performances • Bookings • Events</p>

  <div class="socials">
  <a href="https://instagram.com/frankynero" target="_blank">Instagram</a>
  <a href="https://youtube.com/ELELYONPRODUCTIONS" target="_blank">YouTube</a>
  <a href="https://tiktok.com/@frankynero" target="_blank">TikTok</a>
</div>

  <a href="mailto:frankynero@googlemail.com" class="btn">Book Now</a>
</header>

<div class="container" id="gig-list"></div>

<footer>
  Official Gig Page
</footer>

<script>
  const gigs = [
  { date: "17 Apr 2026 • 8:00PM", venue: "Blockhouse Pub", location: "Devonport Rd, Stoke Village, Plymouth PL1 4DL", type: "LIVE PERFORMANCE" },

  { date: "09 May 2026 • 7:30PM", venue: "Lansdowne Inn", location: "22–24 South St, Torquay TQ2 5AA", type: "LIVE PERFORMANCE" },

  { date: "15 May 2026 • 9:00PM", venue: "Seamus O’Donnells Irish Bar", location: "28 Victoria Parade, Torquay TQ2 5AA", type: "LIVE PERFORMANCE" },

  { date: "29 May 2026 • 8:30PM", venue: "The Brunel Inn", location: "83 Fore St, Saltash PL12 6AE", type: "LIVE PERFORMANCE" },

  { date: "24 Jul 2026 • 8:30PM", venue: "The Brunel Inn", location: "83 Fore St, Saltash PL12 6AE", type: "LIVE PERFORMANCE" },

  { date: "07 Aug 2026 • 8:30PM", venue: "Albemarle Pub", location: "Budshead Rd, Plymouth PL5 4DD", type: "LIVE PERFORMANCE" },

  { date: "28 Aug 2026 • 9:00PM", venue: "Seamus O’Donnells Irish Bar", location: "28 Victoria Parade, Torquay TQ2 5AA", type: "LIVE PERFORMANCE" },

  { date: "04 Sep 2026 • 9:00PM", venue: "Seamus O’Donnells Irish Bar", location: "28 Victoria Parade, Torquay TQ2 5AA", type: "LIVE PERFORMANCE" },

  { date: "20 Nov 2026 • 9:00PM", venue: "Seamus O’Donnells Irish Bar", location: "28 Victoria Parade, Torquay TQ2 5AA", type: "LIVE PERFORMANCE" }
  ];

  const container = document.getElementById("gig-list");

  function loadGigs() {
    container.innerHTML = "";

    gigs.forEach(gig => {
      const div = document.createElement("div");
      div.className = "gig";

      div.innerHTML = `
        <div class="left">
          <div class="date">${gig.date}</div>
          <div class="venue">${gig.venue}</div>
          <div class="location">${gig.location}</div>
        </div>
        <div class="tag">${gig.type}</div>
      `;

      container.appendChild(div);
    });
  }

  loadGigs();
</script>

</body>
</html>
